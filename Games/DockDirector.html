<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dock Director - Fort Lauderdale Waterways</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 900px;
            max-height: 650px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0284c7;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #0284c7;
        }

        /* HUD Overlay */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 8px 12px;
            pointer-events: auto;
        }
        .level-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #38bdf8;
        }
        .vessel-info {
            font-size: 0.75rem;
            color: #9ca3af;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-ok { background: #065f46; color: #34d399; }
        .status-warn { background: #92400e; color: #fcd34d; }
        .status-danger { background: #991b1b; color: #fca5a5; }

        /* Mobile Controls */
        .touch-controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            padding: 8px 12px;
            pointer-events: none;
        }
        .control-group {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        .touch-btn {
            width: 56px;
            height: 56px;
            background: rgba(15, 23, 42, 0.85);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .touch-btn:active {
            background: rgba(56, 189, 248, 0.8);
            border-color: #ffffff;
            transform: scale(0.95);
        }
        .btn-bridge {
            width: auto;
            padding: 0 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: rgba(217, 119, 6, 0.85);
            border-color: #fcd34d;
        }

        /* Modal Overlay */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 7, 18, 0.88);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .modal h2 {
            font-size: 1.5rem;
            color: #f8fafc;
            margin-bottom: 8px;
        }
        .modal p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .btn:active {
            background: #0369a1;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="900" height="650"></canvas>
    
    <div class="ui-overlay">
        <div class="hud-top">
            <div class="card">
                <div class="level-title" id="hud-level">Level 1: Middle River Run</div>
                <div class="vessel-info" id="hud-vessel">Vessel: 18ft Center Console Skiff</div>
            </div>
            <div class="card" style="text-align: right;">
                <div id="hud-status" class="status-badge status-ok">Ready</div>
                <div class="vessel-info" style="margin-top: 4px;" id="hud-timer">Time: 0s</div>
            </div>
        </div>

        <div class="touch-controls">
            <!-- Steering Left/Right -->
            <div class="control-group">
                <div class="touch-btn" id="btn-left">◀</div>
                <div class="touch-btn" id="btn-right">▶</div>
            </div>
            <!-- Action Bridge -->
            <div class="control-group">
                <div class="touch-btn btn-bridge" id="btn-bridge">🌉 Drawbridge</div>
            </div>
            <!-- Throttle Forward/Reverse -->
            <div class="control-group">
                <div class="touch-btn" id="btn-down">▼</div>
                <div class="touch-btn" id="btn-up">▲</div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal active">
        <div class="modal-card">
            <h2 id="modal-title">Dock Director</h2>
            <p id="modal-desc">Navigate Fort Lauderdale's intricate waterways. Dock your vessel safely in the designated green slip without colliding with seawalls or bridges.</p>
            <button class="btn" id="modal-btn" onclick="startLevel()">Start Level 1</button>
        </div>
    </div>
</div>

<script>
/**
 * DOCK DIRECTOR - Mobile-Friendly Navigation Prototype
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME STATE ---
let currentLevelIdx = 0;
let gameState = 'MENU'; // 'MENU', 'PLAYING', 'SUCCESS', 'FAILED'
let levelStartTime = 0;
let elapsedTime = 0;
let spawnGracePeriod = 0; // Prevent instant collisions on level load

// --- INPUT TRACKING ---
const inputs = {
    up: false,
    down: false,
    left: false,
    right: false
};

// Keyboard bindings (Desktop)
window.addEventListener('keydown', (e) => {
    if (['ArrowUp', 'KeyW'].includes(e.code)) inputs.up = true;
    if (['ArrowDown', 'KeyS'].includes(e.code)) inputs.down = true;
    if (['ArrowLeft', 'KeyA'].includes(e.code)) inputs.left = true;
    if (['ArrowRight', 'KeyD'].includes(e.code)) inputs.right = true;
    if (e.code === 'Space' && gameState === 'PLAYING') triggerDrawbridges();
});

window.addEventListener('keyup', (e) => {
    if (['ArrowUp', 'KeyW'].includes(e.code)) inputs.up = false;
    if (['ArrowDown', 'KeyS'].includes(e.code)) inputs.down = false;
    if (['ArrowLeft', 'KeyA'].includes(e.code)) inputs.left = false;
    if (['ArrowRight', 'KeyD'].includes(e.code)) inputs.right = false;
});

// Touch Button Logic
function bindTouchBtn(elementId, inputKey) {
    const btn = document.getElementById(elementId);
    
    const startHandler = (e) => {
        e.preventDefault();
        inputs[inputKey] = true;
    };
    const endHandler = (e) => {
        e.preventDefault();
        inputs[inputKey] = false;
    };

    btn.addEventListener('touchstart', startHandler, { passive: false });
    btn.addEventListener('touchend', endHandler, { passive: false });
    btn.addEventListener('mousedown', startHandler);
    btn.addEventListener('mouseup', endHandler);
    btn.addEventListener('mouseleave', endHandler);
}

bindTouchBtn('btn-up', 'up');
bindTouchBtn('btn-down', 'down');
bindTouchBtn('btn-left', 'left');
bindTouchBtn('btn-right', 'right');

document.getElementById('btn-bridge').addEventListener('click', () => {
    if (gameState === 'PLAYING') triggerDrawbridges();
});

// --- MAP & LEVEL DEFINITIONS ---
const levels = [
    {
        name: "Level 1: Middle River Run",
        vesselName: "18ft Center Console Skiff",
        vesselSpecs: { width: 14, length: 28, maxSpeed: 2.8, turnSpeed: 0.05, accel: 0.08, friction: 0.98 },
        startPos: { x: 80, y: 480, angle: -Math.PI / 2 },
        dock: { x: 780, y: 90, width: 36, height: 60 },
        landmasses: [
            { x: 0, y: 560, w: 900, h: 90 }, // Bottom land clear of spawn at y:480
            { x: 0, y: 0, w: 900, h: 40 },
            { x: 160, y: 150, w: 450, h: 240 },
            { x: 730, y: 180, w: 170, h: 370 }
        ],
        bridges: [],
        sandbars: [{ x: 300, y: 460, radius: 35 }]
    },
    {
        name: "Level 2: Las Olas Isles & Drawbridge",
        vesselName: "42ft Cabin Cruiser",
        vesselSpecs: { width: 22, length: 50, maxSpeed: 2.0, turnSpeed: 0.035, accel: 0.04, friction: 0.97 },
        startPos: { x: 80, y: 500, angle: -Math.PI / 2 },
        dock: { x: 780, y: 70, width: 45, height: 80 },
        landmasses: [
            { x: 0, y: 0, w: 900, h: 40 },
            { x: 0, y: 580, w: 900, h: 70 },
            { x: 150, y: 120, w: 400, h: 180 },
            { x: 650, y: 120, w: 80, h: 280 }
        ],
        bridges: [
            {
                x: 220, y: 380, w: 120, h: 30,
                targetOpen: 0, openProgress: 0
            }
        ],
        sandbars: [{ x: 600, y: 480, radius: 45 }]
    },
    {
        name: "Level 3: Intracoastal Superyacht Basin",
        vesselName: "110ft Tri-Deck Superyacht",
        vesselSpecs: { width: 32, length: 90, maxSpeed: 1.4, turnSpeed: 0.02, accel: 0.02, friction: 0.96 },
        startPos: { x: 80, y: 320, angle: 0 },
        dock: { x: 730, y: 480, width: 55, height: 120 },
        landmasses: [
            { x: 0, y: 0, w: 900, h: 50 },
            { x: 0, y: 50, w: 180, h: 180 },
            { x: 0, y: 420, w: 180, h: 230 },
            { x: 280, y: 150, w: 340, h: 340 },
            { x: 700, y: 50, w: 200, h: 320 },
            { x: 800, y: 450, w: 100, h: 200 }
        ],
        bridges: [
            { x: 180, y: 250, w: 100, h: 30, targetOpen: 0, openProgress: 0 },
            { x: 620, y: 370, w: 80, h: 30, targetOpen: 0, openProgress: 0 }
        ],
        sandbars: [
            { x: 230, y: 550, radius: 55 },
            { x: 660, y: 100, radius: 40 }
        ]
    }
];

// --- BOAT OBJECT CLASS ---
class Boat {
    constructor(x, y, angle, specs) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.speed = 0;
        this.specs = specs;
    }

    update() {
        if (gameState !== 'PLAYING') return;

        // Steering logic
        if (Math.abs(this.speed) > 0.05) {
            const dir = this.speed > 0 ? 1 : -1;
            if (inputs.left) this.angle -= this.specs.turnSpeed * dir;
            if (inputs.right) this.angle += this.specs.turnSpeed * dir;
        }

        // Throttle control
        if (inputs.up) {
            this.speed = Math.min(this.speed + this.specs.accel, this.specs.maxSpeed);
        } else if (inputs.down) {
            this.speed = Math.max(this.speed - this.specs.accel, -this.specs.maxSpeed * 0.5);
        } else {
            this.speed *= this.specs.friction;
        }

        // Apply movement vector
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
    }

    getBounds() {
        const cos = Math.cos(this.angle);
        const sin = Math.sin(this.angle);
        const hw = this.specs.width / 2;
        const hl = this.specs.length / 2;

        return [
            { x: this.x + cos * hl - sin * hw, y: this.y + sin * hl + cos * hw },
            { x: this.x + cos * hl + sin * hw, y: this.y + sin * hl - cos * hw },
            { x: this.x - cos * hl + sin * hw, y: this.y - sin * hl - cos * hw },
            { x: this.x - cos * hl - sin * hw, y: this.y - sin * hl + cos * hw }
        ];
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        // Water wake
        if (Math.abs(this.speed) > 0.3) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.beginPath();
            ctx.moveTo(-this.specs.length / 2, -this.specs.width / 3);
            ctx.lineTo(-this.specs.length / 2 - (this.speed * 6), -this.specs.width);
            ctx.lineTo(-this.specs.length / 2 - (this.speed * 6), this.specs.width);
            ctx.lineTo(-this.specs.length / 2, this.specs.width / 3);
            ctx.fill();
        }

        // Hull
        ctx.fillStyle = '#f8fafc';
        ctx.strokeStyle = '#0f172a';
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(this.specs.length / 2, 0);
        ctx.lineTo(this.specs.length / 4, -this.specs.width / 2);
        ctx.lineTo(-this.specs.length / 2, -this.specs.width / 2);
        ctx.lineTo(-this.specs.length / 2, this.specs.width / 2);
        ctx.lineTo(this.specs.length / 4, this.specs.width / 2);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Cabin
        ctx.fillStyle = '#0284c7';
        ctx.fillRect(-this.specs.length / 4, -this.specs.width / 3, this.specs.length / 2, this.specs.width * 0.66);

        ctx.restore();
    }
}

// --- LEVEL INITIALIZATION & RUNTIME ---
let currentLevel = levels[0];
let playerBoat = new Boat(currentLevel.startPos.x, currentLevel.startPos.y, currentLevel.startPos.angle, currentLevel.vesselSpecs);

function initLevel(index) {
    currentLevelIdx = index;
    currentLevel = levels[currentLevelIdx];
    
    playerBoat = new Boat(
        currentLevel.startPos.x,
        currentLevel.startPos.y,
        currentLevel.startPos.angle,
        currentLevel.vesselSpecs
    );

    currentLevel.bridges.forEach(b => {
        b.targetOpen = 0;
        b.openProgress = 0;
    });

    document.getElementById('hud-level').innerText = currentLevel.name;
    document.getElementById('hud-vessel').innerText = `Vessel: ${currentLevel.vesselName}`;
    updateStatus('Ready', 'status-ok');
}

function startLevel() {
    initLevel(currentLevelIdx);
    gameState = 'PLAYING';
    levelStartTime = Date.now();
    spawnGracePeriod = Date.now() + 1000; // 1 second collision safety buffer
    document.getElementById('modal').classList.remove('active');
}

function triggerDrawbridges() {
    currentLevel.bridges.forEach(b => {
        b.targetOpen = b.targetOpen === 0 ? 1 : 0;
    });
}

function updateStatus(text, className) {
    const badge = document.getElementById('hud-status');
    badge.innerText = text;
    badge.className = `status-badge ${className}`;
}

// --- COLLISION LOGIC ---
function pointInRect(px, py, rx, ry, rw, rh) {
    return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
}

function checkCollisions() {
    if (gameState !== 'PLAYING') return;

    // Grace period check
    if (Date.now() < spawnGracePeriod) return;

    const corners = playerBoat.getBounds();

    // 1. Coastal boundary
    for (let p of corners) {
        if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
            handleCrash("Collided with coastal boundary!");
            return;
        }
    }

    // 2. Seawalls & Landmasses
    for (let land of currentLevel.landmasses) {
        for (let p of corners) {
            if (pointInRect(p.x, p.y, land.x, land.y, land.w, land.h)) {
                handleCrash("Seawall impact!");
                return;
            }
        }
    }

    // 3. Drawbridges
    for (let b of currentLevel.bridges) {
        const gap = b.w * b.openProgress;
        const leftSpanW = (b.w - gap) / 2;
        
        for (let p of corners) {
            if (pointInRect(p.x, p.y, b.x, b.y, leftSpanW, b.h) ||
                pointInRect(p.x, p.y, b.x + b.w - leftSpanW, b.y, leftSpanW, b.h)) {
                handleCrash("Bridge span collision!");
                return;
            }
        }
    }

    // 4. Sandbars
    let grounded = false;
    for (let sb of currentLevel.sandbars) {
        const dx = playerBoat.x - sb.x;
        const dy = playerBoat.y - sb.y;
        if (Math.sqrt(dx * dx + dy * dy) < sb.radius) {
            grounded = true;
            break;
        }
    }

    if (grounded) {
        playerBoat.speed *= 0.85;
        updateStatus('Shallow Waters', 'status-warn');
    } else {
        updateStatus('Navigating', 'status-ok');
    }

    // 5. Docking Check
    const d = currentLevel.dock;
    const boatInDock = pointInRect(playerBoat.x, playerBoat.y, d.x, d.y, d.width, d.height);
    
    if (boatInDock && Math.abs(playerBoat.speed) < 0.3) {
        handleWin();
    }
}

function handleCrash(reason) {
    gameState = 'FAILED';
    updateStatus('Crashed', 'status-danger');
    showModal('Vessel Damaged!', `${reason} Keep an eye on channel clearance.`, 'Try Again', () => startLevel());
}

function handleWin() {
    gameState = 'SUCCESS';
    updateStatus('Docked', 'status-ok');
    
    if (currentLevelIdx < levels.length - 1) {
        showModal('Successfully Docked!', `You navigated ${currentLevel.vesselName} safely into the marina.`, 'Next Level', () => {
            currentLevelIdx++;
            startLevel();
        });
    } else {
        showModal('Master Navigator!', 'You have mastered all waterways from small skiffs up to mega yachts!', 'Play Again', () => {
            currentLevelIdx = 0;
            startLevel();
        });
    }
}

function showModal(title, desc, btnText, action) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-desc').innerText = desc;
    const btn = document.getElementById('modal-btn');
    btn.innerText = btnText;
    btn.onclick = action;
    document.getElementById('modal').classList.add('active');
}

// --- RENDER & GAME LOOP ---
function update() {
    if (gameState === 'PLAYING') {
        playerBoat.update();
        checkCollisions();
        elapsedTime = Math.floor((Date.now() - levelStartTime) / 1000);
        document.getElementById('hud-timer').innerText = `Time: ${elapsedTime}s`;

        // Smooth drawbridge movement
        currentLevel.bridges.forEach(b => {
            if (b.openProgress < b.targetOpen) {
                b.openProgress = Math.min(b.openProgress + 0.025, b.targetOpen);
            } else if (b.openProgress > b.targetOpen) {
                b.openProgress = Math.max(b.openProgress - 0.025, b.targetOpen);
            }
        });
    }
}

function drawMap() {
    // Water
    ctx.fillStyle = '#0284c7';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Sandbars
    currentLevel.sandbars.forEach(sb => {
        ctx.beginPath();
        ctx.arc(sb.x, sb.y, sb.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(253, 224, 71, 0.35)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(234, 179, 8, 0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();
    });

    // Landmasses
    ctx.fillStyle = '#15803d';
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 3;

    currentLevel.landmasses.forEach(l => {
        ctx.fillRect(l.x, l.y, l.w, l.h);
        ctx.strokeRect(l.x, l.y, l.w, l.h);
    });

    // Drawbridges
    currentLevel.bridges.forEach(b => {
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(b.x, b.y, b.w, b.h);

        const gap = b.w * b.openProgress;
        const spanWidth = (b.w - gap) / 2;

        ctx.fillStyle = '#64748b';
        ctx.strokeStyle = '#f59e0b';
        ctx.lineWidth = 2;

        ctx.fillRect(b.x, b.y, spanWidth, b.h);
        ctx.strokeRect(b.x, b.y, spanWidth, b.h);

        ctx.fillRect(b.x + b.w - spanWidth, b.y, spanWidth, b.h);
        ctx.strokeRect(b.x + b.w - spanWidth, b.y, spanWidth, b.h);

        ctx.fillStyle = '#ffffff';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(b.openProgress > 0.8 ? "OPEN" : "DRAWBRIDGE", b.x + b.w / 2, b.y + b.h / 2 + 3);
    });

    // Docking Target
    const d = currentLevel.dock;
    ctx.fillStyle = 'rgba(34, 197, 94, 0.35)';
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 3;
    ctx.setLineDash([6, 6]);
    ctx.fillRect(d.x, d.y, d.width, d.height);
    ctx.strokeRect(d.x, d.y, d.width, d.height);
    ctx.setLineDash([]);

    ctx.fillStyle = '#22c55e';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText("PARK", d.x + d.width / 2, d.y + d.height / 2);
}

function loop() {
    update();
    drawMap();
    if (playerBoat) playerBoat.draw();
    requestAnimationFrame(loop);
}

// Start Main Loop
loop();
</script>

</body>
</html>
