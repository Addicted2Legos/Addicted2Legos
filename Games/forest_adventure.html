<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Verdant Realm — A Forest Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --g1: #0a1f0a;
    --g2: #0f2e0f;
    --g3: #163d16;
    --g4: #1f5c1f;
    --g5: #2d8a2d;
    --g6: #3db33d;
    --g7: #5fd45f;
    --g8: #96e896;
    --g9: #c8f5c8;
    --g10: #eafcea;
    --gold: #c8a84b;
    --gold-light: #e8c97a;
    --cream: #f5f0e0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--g1);
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
    font-size: 18px;
    line-height: 1.75;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(45,138,45,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 90%, rgba(15,46,15,0.3) 0%, transparent 60%),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(45,138,45,0.02) 2px,
        rgba(45,138,45,0.02) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  .leaves {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 120px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 3rem 2rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .title-eyebrow {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--g7);
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 700;
    color: var(--g7);
    text-shadow: 0 0 40px rgba(93,212,93,0.35), 0 2px 0 rgba(0,0,0,0.5);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .title-sub {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.12em;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2rem 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--g5), transparent);
  }

  .divider-gem {
    width: 10px; height: 10px;
    background: var(--g6);
    transform: rotate(45deg);
    box-shadow: 0 0 10px rgba(93,212,93,0.6);
  }

  .scene-card {
    background: linear-gradient(160deg, var(--g2) 0%, var(--g1) 100%);
    border: 1px solid var(--g4);
    border-radius: 4px;
    padding: 2.5rem 2.5rem 2rem;
    margin-bottom: 2rem;
    box-shadow:
      inset 0 1px 0 rgba(93,212,93,0.1),
      0 0 60px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }

  .scene-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--g4), var(--g6), var(--g4));
  }

  .scene-tag {
    display: inline-block;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--g7);
    background: rgba(45,138,45,0.15);
    border: 1px solid rgba(93,212,93,0.25);
    padding: 3px 12px;
    border-radius: 2px;
    margin-bottom: 1.25rem;
  }

  .scene-image {
    font-size: 5rem;
    text-align: center;
    display: block;
    margin: 0.5rem 0 1.5rem;
    filter: drop-shadow(0 0 20px rgba(93,212,93,0.3));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .scene-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--g8);
    margin-bottom: 1rem;
    text-shadow: 0 0 20px rgba(150,232,150,0.3);
  }

  .scene-text {
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--cream);
    font-weight: 300;
  }

  .scene-text em {
    color: var(--g8);
    font-style: italic;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    margin-top: 2rem;
  }

  .choice-btn {
    background: transparent;
    border: 1px solid var(--g4);
    border-radius: 3px;
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    line-height: 1.5;
    padding: 1rem 1.5rem 1rem 3.5rem;
    cursor: pointer;
    text-align: left;
    position: relative;
    transition: all 0.25s ease;
    overflow: hidden;
  }

  .choice-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(45,138,45,0) 0%, rgba(45,138,45,0.08) 100%);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .choice-btn:hover::before { opacity: 1; }

  .choice-btn:hover {
    border-color: var(--g6);
    color: var(--g9);
    transform: translateX(4px);
    box-shadow: -4px 0 0 var(--g6), 0 0 20px rgba(93,212,93,0.1);
  }

  .choice-letter {
    position: absolute;
    left: 1.2rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.75rem;
    color: var(--g6);
    width: 22px;
    height: 22px;
    border: 1px solid var(--g5);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(45,138,45,0.1);
  }

  .ending-card {
    background: linear-gradient(160deg, rgba(22,61,22,0.6) 0%, var(--g1) 100%);
    border: 1px solid var(--g5);
    border-radius: 4px;
    padding: 2rem;
    text-align: center;
    margin-top: 2rem;
  }

  .ending-badge {
    display: inline-block;
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 1rem;
  }

  .ending-badge.victory {
    background: rgba(45,138,45,0.25);
    border: 1px solid var(--g6);
    color: var(--g8);
  }

  .ending-badge.defeat {
    background: rgba(100,20,20,0.25);
    border: 1px solid #8b3a3a;
    color: #e88;
  }

  .ending-badge.secret {
    background: rgba(200,168,75,0.15);
    border: 1px solid var(--gold);
    color: var(--gold-light);
  }

  .restart-btn {
    margin-top: 1.5rem;
    background: rgba(45,138,45,0.2);
    border: 1px solid var(--g5);
    border-radius: 3px;
    color: var(--g8);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    padding: 0.7rem 2rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: rgba(45,138,45,0.35);
    border-color: var(--g6);
    color: var(--g9);
    box-shadow: 0 0 20px rgba(93,212,93,0.15);
  }

  .stats-bar {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 2rem;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--g6);
    letter-spacing: 0.05em;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .stat-dot {
    width: 6px; height: 6px;
    background: var(--g6);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(93,212,93,0.6);
  }

  .fade-in {
    animation: fadeIn 0.6s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .progress-track {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  .progress-pip {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1px solid var(--g4);
    background: transparent;
    transition: all 0.3s;
  }

  .progress-pip.filled {
    background: var(--g6);
    border-color: var(--g6);
    box-shadow: 0 0 6px rgba(93,212,93,0.5);
  }

  footer {
    text-align: center;
    margin-top: 3rem;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--g5);
    opacity: 0.7;
  }
</style>
</head>

<div class="wrapper">
  <header>
    <p class="title-eyebrow">An Interactive Tale</p>
    <h1>The Verdant Realm</h1>
    <p class="title-sub">A Forest Adventure</p>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-gem"></div>
      <div class="divider-line"></div>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar" style="display:none !important;">
    <div class="stat"><div class="stat-dot"></div><span id="stat-depth">Depth: 0</span></div>
    <div class="stat"><div class="stat-dot"></div><span id="stat-path">Path: —</span></div>
  </div>

  <div class="progress-track" id="progress-track"></div>

  <div id="game-area"></div>

  <footer>Whispered to you by the ancient forest &middot; <em>May your path be green and your heart be true</em></footer>
</div>

    choices: [

    title: "Voice of the Wild",
    text: `The old woman cups your face in her bark-rough hands and whispers in a language you don't know — but somehow understand completely. A warmth spreads from your ears down through your chest.<br><br>You step outside and immediately hear an argument between two squirrels about a stolen acorn cache. A deer nudges your hand with her nose. <em>"The Heartwood is sick,"</em> she murmurs. <em>"Follow me. Only someone with the gift can help now."</em><br><br>You follow the deer deeper into the ancient green dark — and as you walk, the forest seems to breathe around you in welcome.`,

    type: "secret",
    title: "The Warden's Mantle",
    text: `You follow the leaf's warmth to a glade of impossible beauty — flowers that glow, a pool like liquid starlight, and a great stone table on which lie the tools of office: a cloak of living leaves, a staff of rowan wood, a lantern that burns green.<br><br>The forest has chosen its new Warden.<br><br>You were not looking for this. But then, you were not looking for any of this when you stepped into the green this morning.<br><br>You pick up the cloak. It settles around your shoulders like it has always been there.`,
    secret: true
  },
  ending_sky: {
    tag: "Ending",
    emoji: "☁️",
    type: "victory",
    title: "The Path Between Stars",
    text: `The path spirals upward through layers of cloud and light until you emerge into a place that is neither forest nor sky but something in between — a realm of living constellations shaped like leaves and roots and ancient trees.<br><br>A voice that is somehow made of wind says: <em>"Few find this path. Fewer still choose it."</em><br><br>You spend what feels like years here, learning the shape of things, before the path gently returns you to the forest floor.<br><br>You are different now. The forest knows it. It bows as you pass.`
  },
  ending_defeat: {
    tag: "Ending",
    emoji: "🌑",
    type: "defeat",
    title: "The Cost of Waiting",
    text: `You spend the rest of the day preparing, gathering, hesitating. By moonrise, the keeper is gone — door locked, fire cold.<br><br>You search for the path she would have shown you. The forest is silent now in a different way — not welcoming, but watchful. Whatever window of time existed, you have stepped outside it.<br><br>The bell, you know, will not ring again for a very long time.<br><br><em>Some moments do not wait for us.</em><br><br>You find your way back to the edge of the forest. The trees let you leave. But they do not say goodbye.`
  }
};

let visitedCount = 0;
const MAX_DEPTH = 5;

function getDepthPips(current, max) {
  let html = '';
  for (let i = 0; i < max; i++) {
    html += `<div class="progress-pip ${i < current ? 'filled' : ''}"></div>`;
  }
  return html;
}

function renderScene(sceneId) {
  const scene = SCENES[sceneId];
  if (!scene) return;
  visitedCount++;

  document.getElementById('progress-track').innerHTML = getDepthPips(visitedCount, MAX_DEPTH);

  const area = document.getElementById('game-area');
  const isEnding = !scene.choices;

  let choicesHtml = '';
  if (scene.choices) {
    const letters = ['A', 'B', 'C', 'D'];
    choicesHtml = `<div class="choices">
      ${scene.choices.map((c, i) => `
        <button class="choice-btn" onclick="go('${c.next}')">
          <span class="choice-letter">${letters[i]}</span>
          ${c.text}
        </button>
      `).join('')}
    </div>`;
  }

  let endingHtml = '';
  if (isEnding) {
    const type = scene.type || 'victory';
    const labels = { victory: 'Victory', defeat: 'Fate Sealed', secret: 'Secret Ending Discovered' };
    endingHtml = `
      <div class="ending-card">
        <div class="ending-badge ${type}">${labels[type]}</div>
        <p style="font-style: italic; color: var(--g8); font-size: 0.9rem; margin-bottom: 1rem;">
          ${type === 'secret' ? '✦ You found a hidden path ✦' : type === 'victory' ? 'The forest remembers you.' : 'Perhaps next time, the green will call again.'}
        </p>
        <button class="restart-btn" onclick="restart()">⟳ Begin Again</button>
      </div>
    `;
  }

  area.innerHTML = `
    <div class="scene-card fade-in">
      <div class="scene-tag">${scene.tag}</div>
      <span class="scene-image">${scene.emoji}</span>
      <h2 class="scene-title">${scene.title}</h2>
      <p class="scene-text">${scene.text}</p>
      ${choicesHtml}
    </div>
    ${endingHtml}
  `;
}

function go(sceneId) {
  renderScene(sceneId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  visitedCount = 0;
  renderScene('start');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderScene('start');
</script>
</body>
</html>
