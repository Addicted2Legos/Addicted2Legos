<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Click Lasers</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #080810;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff;
            pointer-events: none;
        }
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 16, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            z-index: 10;
        }
        #game-over-screen {
            display: none;
        }
        h1 {
            font-size: 42px;
            color: #ff0055;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            color: #00ffff;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00ffff;
        }
        .btn {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transition: all 0.2s ease;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover,
        .btn:focus {
            text-decoration: none;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('Click_Lasers_Background.png') center/cover no-repeat;
            opacity: 0.25;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="score-display">SCORE: 0</div>
        <div id="lives-display">LIVES: 3</div>
    </div>

    <div id="start-screen">
        <h1>CLICK LASERS</h1>
        <p>Tap anywhere to shoot. Defend the perimeter.</p>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>

    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <p id="final-score">Final Score: 0</p>
        <button class="btn" onclick="restartGame()">Play Again</button>
        <button class="btn" onclick="mainMenu()">Main Menu</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const finalScoreText = document.getElementById('final-score');

        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let lives = 3;
        let lasers = [];
        let targets = [];
        let particles = [];
        let spawnTimer = 0;
        let spawnInterval = 90; // frames between spawns
        let gameSpeedModifier = 1;

        // Resize canvas dynamically
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Game Entities Classes
        class Laser {
            constructor(startX, startY, targetX, targetY) {
                this.startX = startX;
                this.startY = startY;
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                
                // Calculate trajectory vector
                let dx = targetX - startX;
                let dy = targetY - startY;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                this.speed = 25; 
                this.vx = (dx / distance) * this.speed;
                this.vy = (dy / distance) * this.speed;
                this.active = true;
                this.life = 0;
                this.maxLife = distance / this.speed;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life++;
                if (this.life >= this.maxLife) {
                    this.active = false; // reached destination
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x - this.vx * 0.5, this.y - this.vy * 0.5);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 4;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffff';
                ctx.stroke();
                ctx.shadowBlur = 0; // reset
            }
        }

        class Target {
            constructor() {
                this.radius = Math.random() * 15 + 15;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = (Math.random() * 2 + 1.5) * gameSpeedModifier;
                this.color = `hsl(${Math.random() * 60 + 330}, 100%, 60%)`; // Pink/Red neon spectrum
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'transparent';
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
                ctx.stroke();
                
                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 3 + 1;
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.015;
                this.color = color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // Fire Laser Trigger
        function fireLaser(e) {
            if (gameState !== 'PLAYING') return;
            
            // Get correct event coordinates for touch or mouse
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Base position of player turret (bottom center)
            let baseX = canvas.width / 2;
            let baseY = canvas.height;

            lasers.push(new Laser(baseX, baseY, clientX, clientY));
        }

        // Input Listeners
        window.addEventListener('mousedown', (e) => fireLaser(e));
        window.addEventListener('touchstart', (e) => {
            if (gameState !== 'PLAYING') return;
            fireLaser(e);
            e.preventDefault(); // prevents button click
        }, { passive: false });


        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
            // Add a few bright laser colored shards too
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(x, y, '#00ffff'));
            }
        }

        // Game Loop Functions
        function startGame() {
            gameState = 'PLAYING';
            startScreen.style.display = 'none';
            resetData();
        }

        function restartGame() {
            gameOverScreen.style.display = 'none';
            gameState = 'PLAYING';
            resetData();
        }

        function mainMenu() {
            window.location.href = 'index.html';
        }

        function resetData() {
            score = 0;
            lives = 3;
            lasers = [];
            targets = [];
            particles = [];
            spawnTimer = 0;
            gameSpeedModifier = 1;
            scoreDisplay.innerText = `SCORE: ${score}`;
            livesDisplay.innerText = `LIVES: ${lives}`;
        }

        function triggerGameOver() {
            gameState = 'GAMEOVER';
            finalScoreText.innerText = `Final Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }

        // Main Loop
        function gameLoop() {
            ctx.fillStyle = 'rgba(8, 8, 16, 0.3)'; // Trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'PLAYING') {
                // Handle Spawning
                spawnTimer++;
                if (spawnTimer >= spawnInterval) {
                    targets.push(new Target());
                    spawnTimer = 0;
                    // Gradually make it harder
                    if (spawnInterval > 35) spawnInterval -= 1;
                    gameSpeedModifier += 0.02;
                }

                // Draw Base/Turret Glow
                ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height, 40, Math.PI, 0);
                ctx.fillStyle = '#00ffff';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ffff';
                ctx.fill();
                ctx.shadowBlur = 0;

                // Update & Draw Lasers
                for (let i = lasers.length - 1; i >= 0; i--) {
                    let l = lasers[i];
                    l.update();
                    l.draw();

                    // Check collisions with all targets
                    for (let j = targets.length - 1; j >= 0; j--) {
                        let t = targets[j];
                        let dist = Math.hypot(l.x - t.x, l.y - t.y);
                        
                        // Hit registration
                        if (dist < t.radius + 10) { 
                            createExplosion(t.x, t.y, t.color);
                            targets.splice(j, 1);
                            l.active = false;
                            score += 10;
                            scoreDisplay.innerText = `SCORE: ${score}`;
                            break;
                        }
                    }

                    if (!l.active) lasers.splice(i, 1);
                }

                // Update & Draw Targets
                for (let i = targets.length - 1; i >= 0; i--) {
                    let t = targets[i];
                    t.update();
                    t.draw();

                    // Check if passed the bottom screen border
                    if (t.y - t.radius > canvas.height) {
                        targets.splice(i, 1);
                        lives--;
                        livesDisplay.innerText = `LIVES: ${lives}`;
                        if (lives <= 0) {
                            triggerGameOver();
                        }
                    }
                }
            }

            // Update & Draw Particles (Happens even during Game Over for visual finish)
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.alpha <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(gameLoop);
        }

        // Run loop natively
        gameLoop();
    </script>
</body>
</html>
